# All-in-one PV Super Package
# Contains module analysis sensors and super dashboard aggregate sensors

template:
  - sensor:
      - name: pv_module_model_area
        unique_id: pv_module_model_area
        unit_of_measurement: "mÂ²"
        state: '1.998108'

      - name: pv_module_model_efficiency_stc
        unique_id: pv_module_model_efficiency_stc
        unit_of_measurement: "%"
        state: '22.3'

      - name: pv_module_model_temp_coeff_power
        unique_id: pv_module_model_temp_coeff_power
        unit_of_measurement: "%/Â°C"
        state: '-0.30'

      - name: pv_expected_module_power_flat_ref
        unique_id: pv_expected_module_power_flat_ref
        unit_of_measurement: "W"
        icon: mdi:solar-power
        state: >
          {% set rad = states('sensor.ecowitt_solar_radiation_10XXX') | float(0) %}
          {% set area = 1.998108 %}
          {% set eta = 0.223 %}
          {% set ambient = states('sensor.ecowitt_outdoor_temp_10XXX') | float(25) %}
          {% set coeff = -0.003 %}
          {% set temp_factor = 1 + coeff * (ambient - 25) %}
          {{ (rad * area * eta * temp_factor) | round(1) }}
        attributes:
          note: 'Referenzwert mit horizontaler Einstrahlung und AuÃŸentemperatur; dient als Vergleich, nicht als exakter Sollwert.'

      - name: pv_module_1_1_7_expected_power
        unique_id: pv_module_1_1_7_expected_power
        unit_of_measurement: "W"
        icon: mdi:chart-bell-curve
        state: >
          {% set rad = states('sensor.ecowitt_solar_radiation_10XXX') | float(0) %}
          {% set module_temp = states('sensor.jv123456789_temperatur') | float(25) %}
          {% set actual = states('sensor.jv123456789_ausgangsleistung') | float(0) %}
          {% set area = 1.998108 %}
          {% set eta = 0.223 %}
          {% set coeff = -0.003 %}
          {% set temp_factor = 1 + coeff * (module_temp - 25) %}
          {% set expected = rad * area * eta * temp_factor %}
          {{ [expected, 0] | max | round(1) }}
        attributes:
          module_label: '1.1.7'
          actual_power_w: "{{ states('sensor.jv123456789_ausgangsleistung') }}"

      - name: pv_module_1_1_7_performance
        unique_id: pv_module_1_1_7_performance
        unit_of_measurement: "%"
        icon: mdi:speedometer
        state: >
          {% set actual = states('sensor.jv123456789_ausgangsleistung') | float(0) %}
          {% set expected = states('sensor.pv_module_1_1_7_expected_power') | float(0) %}
          {% if expected > 0 %}
            {{ ((actual / expected) * 100) | round(1) }}
          {% else %}
            0
          {% endif %}
        attributes:
          note: 'Werte Ã¼ber 100 % sind mÃ¶glich, weil der Ecowitt-Sensor horizontal misst und das Modul geneigt ist.'

      - name: pv_module_1_1_7_temp_delta
        unique_id: pv_module_1_1_7_temp_delta
