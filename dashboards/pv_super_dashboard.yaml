  - title: PV Diagnose
    path: pv-diagnose
    icon: mdi:solar-power-variant
    cards:
      - type: markdown
        content: >
          ## PV Diagnose

          Vergleich von Einstrahlung, Modulleistung, Effizienz und
          Temperaturdifferenz.
      - type: grid
        columns: 4
        square: false
        cards:
          - type: entity
            entity: sensor.ecowitt_solar_radiation_10XXX
            name: Einstrahlung
          - type: entity
            entity: sensor.ecowitt_outdoor_temp_10XXX
            name: Außentemperatur
          - type: entity
            entity: sensor.pv_expected_module_power_flat_ref
            name: Referenz-Modulleistung
          - type: entity
            entity: sensor.pv_row_1_1_average_power_fixed
            name: Ø Leistung Reihe 1.1
          - type: entity
            entity: sensor.pv_row_1_2_average_power_fixed
            name: Ø Leistung Reihe 1.2
          - type: entity
            entity: sensor.pv_row_1_1_average_performance_fixed
            name: Ø Effizienz Reihe 1.1
          - type: entity
            entity: sensor.pv_row_1_2_average_performance_fixed
            name: Ø Effizienz Reihe 1.2
          - type: entity
            entity: sensor.pv_module_1_1_7_temp_delta
            name: ΔT Beispiel 1.1.7
      - type: horizontal-stack
        cards:
          - type: entities
            title: Schwächstes Modul Reihe 1.1
            entities:
              - entity: sensor.pv_row_1_1_worst_module_label_fixed
                name: Modul
              - entity: sensor.pv_row_1_1_worst_module_performance_fixed
                name: Effizienz
              - entity: sensor.pv_row_1_1_average_performance_fixed
                name: Reihe Ø Effizienz
          - type: entities
            title: Schwächstes Modul Reihe 1.2
            entities:
              - entity: sensor.pv_row_1_2_worst_module_label_fixed
                name: Modul
              - entity: sensor.pv_row_1_2_worst_module_performance_fixed
                name: Effizienz
              - entity: sensor.pv_row_1_2_average_performance_fixed
                name: Reihe Ø Effizienz
      - type: history-graph
        title: Einstrahlung vs Referenz-Modulleistung
        hours_to_show: 12
        entities:
          - entity: sensor.ecowitt_solar_radiation_10XXX
            name: Einstrahlung
          - entity: sensor.pv_expected_module_power_flat_ref
            name: Referenz-Modulleistung
      - type: entities
        title: Beispielmodul 1.1.7
        entities:
          - entity: sensor.jv123456789_ausgangsleistung
            name: Aktuelle Leistung
          - entity: sensor.jv123456789_ausgangsspannung
            name: Spannung
          - entity: sensor.jv123456789_temperatur
            name: Modultemperatur
          - entity: sensor.pv_module_1_1_7_expected_power
            name: Erwartete Leistung
          - entity: sensor.pv_module_1_1_7_performance
            name: Effizienz / Performance
          - entity: sensor.pv_module_1_1_7_temp_delta
            name: ΔT
      - type: markdown
        content: >
          **Interpretation**

          - Performance deutlich unter dem Reihenmittel kann auf Verschattung,
          Verschmutzung oder einen Optimierer-/Modulfehler hindeuten.

          - ΔT stark erhöht kann auf hohe Einstrahlung oder thermische
          Auffälligkeiten hinweisen.

          - Werte über 100 % Performance sind möglich, weil dein Ecowitt-Sensor
          horizontal misst, die Module aber geneigt sind.
  - title: PV Heatmap
    path: pv-heatmap
    icon: mdi:solar-panel-large
    type: custom:grid-layout
    layout:
      grid-template-columns: 1fr
      grid-template-rows: auto auto auto auto
      grid-template-areas: |
        "header"
        "row1"
        "row2"
        "row3"
    cards:
      - type: markdown
        view_layout:
          grid-area: header
        content: |
          ## PV Heatmap Pro
          - 🔴 roter Punkt = schwächstes Modul der jeweiligen Reihe
          - ⚠ = erhöhte Temperaturdifferenz
          - Blau = mindestens 90 % vom Reihenmittel
          - Orange = 75–90 % vom Reihenmittel
          - Rot = unter 75 % vom Reihenmittel
      - type: horizontal-stack
        view_layout:
          grid-area: row1
        cards:
