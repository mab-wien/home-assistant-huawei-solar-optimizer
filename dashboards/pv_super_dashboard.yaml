button_card_templates:
  pv_module_status:
    show_icon: false
    show_state: true
    tap_action:
      action: more-info
    styles:
      card:
        - padding: 14px
        - height: 142px
        - border-radius: 16px
        - background: rgba(10,40,90,0.92)
        - color: white
        - box-sizing: border-box
      grid:
        - grid-template-areas: '"n dot" "s s" "volt volt" "temp temp" "energy energy"'
        - grid-template-columns: 1fr min-content
        - grid-template-rows: min-content min-content min-content min-content min-content
      name:
        - justify-self: start
        - align-self: start
        - font-weight: bold
        - font-size: 14px
        - line-height: 1.1
      state:
        - justify-self: start
        - align-self: start
        - font-size: 24px
        - font-weight: 700
        - line-height: 1.1
      custom_fields:
        dot:
          - justify-self: end
          - align-self: start
          - font-size: 12px
        volt:
          - justify-self: start
          - font-size: 15px
          - opacity: 0.88
        temp:
          - justify-self: start
          - font-size: 15px
          - opacity: 0.88
        energy:
          - justify-self: start
          - font-size: 11px
          - opacity: 0.55
    custom_fields:
      dot: |
        [[[
          const base = entity.entity_id.replace('_ausgangsleistung','');
          const alarm = (states[base + '_alarm']?.state ?? '').toString().toLowerCase();
          const status = (states[base + '_betriebsstatus']?.state ?? '').toString().toLowerCase();
          if (alarm && alarm !== '0' && alarm !== 'normal' && alarm !== 'none' && alarm !== 'kein alarm') return '<span style="color:#ff5f57">●</span>';
          if (status && status !== 'normal' && status !== 'running' && status !== 'betrieb' && status !== 'online') return '<span style="color:#f4c542">●</span>';
          return '<span style="color:#55d66b">●</span>';
        ]]]
      volt: |
        [[[
          const base = entity.entity_id.replace('_ausgangsleistung','');
          return (states[base + '_ausgangsspannung']?.state ?? '-') + ' V';
        ]]]
      temp: |
        [[[
          const base = entity.entity_id.replace('_ausgangsleistung','');
          return (states[base + '_temperatur']?.state ?? '-') + ' °C';
        ]]]
      energy: |
        [[[
          const base = entity.entity_id.replace('_ausgangsleistung','');
          return (states[base + '_energie']?.state ?? '-') + ' kWh';
        ]]]
  pv_heatmap_pro:
    show_icon: false
    show_state: true
    tap_action:
      action: more-info
    styles:
      card:
        - padding: 10px
        - height: 126px
        - border-radius: 14px
        - color: white
      grid:
        - grid-template-areas: '"n dot warn" "s s s" "eff eff eff" "delta delta delta"'
        - grid-template-columns: 1fr min-content min-content
        - grid-template-rows: min-content min-content min-content min-content
      name:
        - justify-self: start
        - font-weight: bold
        - font-size: 14px
      state:
        - justify-self: start
        - font-size: 24px
        - font-weight: 700
      custom_fields:
        dot:
          - justify-self: end
          - font-size: 12px
        warn:
          - justify-self: end
          - font-size: 12px
        eff:
          - justify-self: start
          - font-size: 12px
          - opacity: 0.92
        delta:
          - justify-self: start
          - font-size: 11px
          - opacity: 0.78
    custom_fields:
      dot: |
        [[[
          const worst = states[variables.worst_label_entity]?.state ?? '';
          return worst === variables.module_label ? '<span style="color:#ff5f57">●</span>' : '<span style="color:#55d66b">●</span>';
        ]]]
      warn: |
        [[[
          const t = Number(states[variables.temp_delta_entity]?.state ?? 0);
          return t >= 25 ? '<span style="color:#ffb020">⚠</span>' : '';
        ]]]
      eff: |
        [[[
          const v = Number(states[variables.perf_entity]?.state ?? 0);
          return 'Eff ' + (v ? v.toFixed(1) : '-') + ' %';
        ]]]
      delta: |
        [[[
          const avg = Number(states[variables.row_avg_entity]?.state ?? 0);
          const cur = Number(states[variables.perf_entity]?.state ?? 0);
          if (!avg || !cur) return 'Δ -';
          const d = ((cur / avg) * 100) - 100;
          return 'Δ ' + (d > 0 ? '+' : '') + d.toFixed(0) + ' %';
        ]]]
    state:
      - operator: template
        value: >
          [[[ const avg = Number(states[variables.row_avg_entity]?.state ?? 0);
          const cur = Number(states[variables.perf_entity]?.state ?? 0); return
          avg && cur && cur < avg * 0.75; ]]]
        styles:
          card:
            - background: rgba(180,40,40,0.92)
            - border: 2px solid rgba(255,255,255,0.15)
      - operator: template
        value: >
          [[[ const avg = Number(states[variables.row_avg_entity]?.state ?? 0);
          const cur = Number(states[variables.perf_entity]?.state ?? 0); return
          avg && cur && cur >= avg * 0.75 && cur < avg * 0.9; ]]]
        styles:
          card:
            - background: rgba(201,132,39,0.92)
            - border: 2px solid rgba(255,255,255,0.12)
      - operator: template
        value: >
          [[[ const avg = Number(states[variables.row_avg_entity]?.state ?? 0);
          const cur = Number(states[variables.perf_entity]?.state ?? 0); return
          avg && cur && cur >= avg * 0.9; ]]]
        styles:
          card:
            - background: rgba(25,84,155,0.96)
            - border: 2px solid rgba(255,255,255,0.08)
